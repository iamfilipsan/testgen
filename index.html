<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

// ─── DATA ─────────────────────────────────────────────────────────────────────

const CLASSES = [
  {id:"prima",   label:"PRIMA",   level:"A1",     cefr:"A1", book:"Get Involved A1"},
  {id:"sekunda", label:"SEKUNDA", level:"A2",     cefr:"A2", book:"Get Involved A2"},
  {id:"tercie",  label:"TERCIE",  level:"A2+",    cefr:"A2", book:"Get Involved A2+"},
  {id:"kvarta",  label:"KVARTA",  level:"A2+/B1", cefr:"B1", book:"Get Involved A2+"},

const CEFR = {
  A1:"Present simple only. Max 5-word sentences. Basic vocab: family, colours, numbers, school objects. No past tense, no modals.",
  A2:"Present simple/continuous, past simple (regular verbs). Everyday vocab: food, school, sports. Max 8-word sentences.",

};

const DEFAULT_TYPES = [
  "Grammar — Fill in the gaps",
  "Grammar — Multiple choice (4 options)",
  "Grammar — Transform / rewrite sentences",
  "Vocabulary — Translation CZ→EN",
  "Vocabulary — Definitions (write the word)",
  "Vocabulary — Fill in the gaps",
  "Writing — Complete the sentences",
];

const DEFAULT_TOPICS = {
  prima:   ["Present simple","Numbers & colours","Family vocabulary","School objects"],
  sekunda: ["Present continuous","Past simple","Daily routines","Food & drink"],
  tercie:  ["Comparatives","Going to / will","Environment","Travel & transport"],
  kvarta:  ["Zero & first conditional","Used to","Quantities","Home & rooms"],
  kvinta:  ["Present perfect","Passive voice","Health & medicine","Media & technology"],
  sexta:   ["Modal verbs","Reported speech","Crime & justice","Social media"],
  septima: ["Second & third conditional","Gerunds & infinitives","Business English","Global issues"],

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}

// ─── API ──────────────────────────────────────────────────────────────────────

async function claude(apiKey, prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-allow-browser": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      system: "You are an expert English examiner for Czech gymnasium. Strict CEFR compliance. Respond ONLY with raw valid JSON — zero markdown, zero fences, nothing else.",
      messages: [{role:"user", content:prompt}],
    }),
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  const raw = d.content?.map(b => b.text||"").join("") || "";
  const cleaned = raw.replace(/^```(?:json)?\n?/i,"").replace(/\n?```$/,"").trim();
  const m = cleaned.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("No JSON found in response");
  return JSON.parse(m[0]);
}

function promptTest(cls, topics, n, types, words, variant) {
  const typeList = types.slice(0,n).map((t,i)=>`${i+1}. ${t}`).join(" | ");
  const vNote = variant==="B"
    ? "VARIANT B: same difficulty and topic but entirely different sentences, words and examples so students cannot copy."
    : "VARIANT A.";
  return `Create a ${n}-section English test. ${vNote}
CLASS: ${cls.label} | CEFR: ${cls.cefr} (${cls.level}) | TOPIC(S): ${topics.join(", ")}
CEFR RULES: ${CEFR[cls.cefr]}
${words ? `MUST include these words/structures: ${words}` : ""}
Section types in order: ${typeList}
Each section: exactly 5 items. Mark blanks clearly with ___.
Return ONLY raw JSON (no fences, no explanation):
{"title":"...","class":"${cls.label}","topics":"${topics.join(", ")}","variant":"${variant}","level":"${cls.level}","sections":[{"type":"...","instructions":"...","wordBox":["w1","w2"],"content":[{"question":"...","options":["a","b","c","d"],"czech":"..."}],"score":5}]}
IMPORTANT: wordBox=null if not needed. options=null if not multiple choice. czech=null if not translation.`;
}

function promptRegen(cls, topic, sec, variant, extra) {
  return `Regenerate ONE test section. ${extra || "Use fresh items, same difficulty."}
CLASS: ${cls.label} | CEFR: ${cls.cefr} | TOPIC: ${topic} | VARIANT: ${variant}
CEFR RULES: ${CEFR[cls.cefr]}
TYPE: ${sec.type} | ITEMS: ${sec.content?.length || 5}
Return ONLY raw JSON (no fences):
{"type":"${sec.type}","instructions":"...","wordBox":null,"content":[{"question":"...","options":null,"czech":null}],"score":${sec.score||5}}`;
}

// ─── PDF ──────────────────────────────────────────────────────────────────────

function makePDF(test, variant) {
  const secs = test.sections || [];
  const total = secs.reduce((s,x) => s+(x.score||0), 0);
  const canHalf = s => !s.content?.some(i=>i?.options) && (s.content?.length||0)<=5 && !s.type?.toLowerCase().includes("writing");

  const itemHTML = (item, i) => {
    if (!item) return "";
    const q = item.czech
      ? `<span style="color:#888;font-size:10pt">${item.czech}</span>&nbsp;&nbsp;→&nbsp;&nbsp;___________________________`
      : (item.question||"");
    const opts = item.options
      ? `<div style="display:flex;gap:16pt;margin-top:4pt;flex-wrap:wrap">${item.options.map((o,j)=>`<span style="font-size:10pt;color:#444"><b style="color:#111">${String.fromCharCode(65+j)}.</b> ${o}</span>`).join("")}</div>`
      : "";
    const ws = !item.options && !item.czech
      ? `<div style="height:24pt;border-bottom:0.5pt solid #ccc;margin-top:4pt"></div>` : "";
    return `<div style="display:flex;gap:9pt;margin-bottom:13pt;font-size:11pt;line-height:1.7"><span style="font-family:monospace;font-size:9pt;color:#bbb;min-width:16pt;flex-shrink:0;padding-top:2pt">${i+1}.</span><div style="flex:1">${q}${opts}${ws}</div></div>`;
  };

  const secHTML = (sec, idx, half) => {
    const letter = String.fromCharCode(65+idx);
    const wb = sec.wordBox?.length
      ? `<div style="border:1pt solid #e8e8e8;padding:7pt 11pt;display:flex;flex-wrap:wrap;gap:6pt;margin-bottom:11pt;background:#fafafa">${sec.wordBox.map(w=>`<span style="font-family:monospace;font-size:9pt;background:#f0f0f0;padding:2pt 8pt">${w}</span>`).join("")}</div>`
      : "";
    const items = (sec.content||[]).map((item,i) => itemHTML(item,i)).join("");
    const width = half ? "calc(50% - 10pt)" : "100%";
    return `<div style="width:${width};margin-bottom:20pt;page-break-inside:avoid">
      <div style="display:flex;gap:11pt;align-items:flex-start;margin-bottom:9pt">
        <span style="font-size:28pt;line-height:1;color:#e8e8e8;font-weight:900;flex-shrink:0;font-family:sans-serif">${letter}</span>
        <div>
          <div style="font-weight:700;font-size:9pt;letter-spacing:0.12em;text-transform:uppercase">${sec.type}</div>
          ${sec.instructions ? `<div style="font-size:9pt;color:#888;font-style:italic;margin-top:2pt">${sec.instructions}</div>` : ""}
        </div>
      </div>
      ${wb}${items}
      <div style="text-align:right;font-family:monospace;font-size:9pt;color:#bbb">Score ___/${sec.score||5}</div>
    </div>`;
  };

  let body = ""; let i = 0;
  while (i < secs.length) {
    const s1 = secs[i], s2 = secs[i+1];
    if (s2 && canHalf(s1) && canHalf(s2)) {
      body += `<div style="display:flex;gap:20pt">${secHTML(s1,i,true)}${secHTML(s2,i+1,true)}</div>`;
      i += 2;
    } else {
      body += secHTML(s1, i, false);
      i++;
    }
  }

  return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>${test.title} — Variant ${variant}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f0f0ee;}
.page{max-width:210mm;margin:0 auto;padding:14mm 16mm;background:#fff;}
.btn{position:fixed;top:16px;right:16px;background:#000;color:#fff;border:none;padding:11px 20px;font-size:10px;letter-spacing:0.18em;font-weight:700;cursor:pointer;z-index:99;}
@media print{body{background:#fff;}.page{padding:10mm 14mm;max-width:100%;}.btn{display:none!important;}}
@media screen{.page{margin:20px auto;box-shadow:0 2px 24px rgba(0,0,0,.1);}}
</style></head>
<body>
<button class="btn" onclick="window.print()">PRINT / SAVE PDF</button>
<div class="page">
  <div style="border-top:3pt solid #000;border-bottom:1pt solid #ccc;padding:12pt 0;margin-bottom:20pt;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10pt">
    <div>
      <div style="font-size:8pt;color:#bbb;letter-spacing:0.18em;margin-bottom:4pt;font-family:monospace">VARIANT ${variant}</div>
      <div style="font-weight:900;font-size:16pt;letter-spacing:0.03em">${test.title}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5pt;text-align:right">
      <span style="font-size:10pt;font-weight:500">NAME: _________________________________</span>
      <span style="font-size:10pt;font-weight:500">CLASS: _____________ DATE: ______________</span>
    </div>
  </div>
  ${body}
  <div style="border-top:2pt solid #000;padding-top:9pt;text-align:right;font-weight:900;font-size:12pt;letter-spacing:0.1em">TOTAL: _____ / ${total}</div>
</div></body></html>`;
}

function openPDF(test, variant) {
  const html = makePDF(test, variant);
  const url = URL.createObjectURL(new Blob([html], {type:"text/html"}));
  window.open(url, "_blank");
}

// ─── WORD ─────────────────────────────────────────────────────────────────────

async function exportWord(test, variant) {
  if (!window.docx) {
    await new Promise((res,rej) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js";
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  const {Document,Packer,Paragraph,TextRun,AlignmentType,BorderStyle} = window.docx;
  const p = (runs,opts={}) => new Paragraph({children:Array.isArray(runs)?runs:[runs],...opts});
  const t = (text,opts={}) => new TextRun({text,font:"Arial",...opts});
  const children = [];

  children.push(p(t(test.title+" — Variant "+variant,{bold:true,size:28}),{spacing:{after:80}}));
  children.push(p(t(`${test.class}  ·  ${test.level}  ·  ${test.topics||""}`,{size:18,color:"888888"}),{spacing:{after:180}}));
  children.push(p(t("NAME: _________________________________   CLASS: ___________   DATE: ____________",{size:20}),
    {spacing:{after:280},border:{bottom:{style:BorderStyle.SINGLE,size:4,color:"CCCCCC"}}}));

  for (const [si,sec] of (test.sections||[]).entries()) {
    const letter = String.fromCharCode(65+si);
    children.push(p(t(`${letter}.  ${sec.type.toUpperCase()}`,{bold:true,size:22}),{spacing:{before:300,after:60}}));
    if (sec.instructions) children.push(p(t(sec.instructions,{italics:true,size:18,color:"666666"}),{spacing:{after:80}}));
    if (sec.wordBox?.length) children.push(p(t("[ "+sec.wordBox.join("  ·  ")+" ]",{size:18,font:"Courier New"}),{spacing:{after:110}}));
    const isW = sec.type.toLowerCase().includes("writing")||sec.type.toLowerCase().includes("complet");
    for (const [ii,item] of (sec.content||[]).entries()) {
      const q = item.czech ? `${ii+1}.   ${item.czech}  →  ___________________________` : `${ii+1}.   ${item.question||""}`;
      children.push(p(t(q,{size:20}),{spacing:{after:item.options?40:isW?10:160}}));
      if (item.options) children.push(p(t(item.options.map((o,j)=>`${String.fromCharCode(65+j)}.  ${o}`).join("        "),{size:18,color:"444444"}),{spacing:{after:140}}));
      if (isW) {
        for(let l=0;l<2;l++) children.push(p(t(" ",{size:20}),{border:{bottom:{style:BorderStyle.SINGLE,size:2,color:"CCCCCC"}},spacing:{after:0}}));
        children.push(p(t(" "),{spacing:{after:80}}));
      }
    }
    children.push(p(t(`Score: ___ / ${sec.score||5}`,{size:18,color:"AAAAAA"}),{alignment:AlignmentType.RIGHT,spacing:{after:40}}));
  }
  const total = test.sections?.reduce((s,x)=>s+(x.score||0),0)||0;
  children.push(p(t(`TOTAL: _____ / ${total}`,{bold:true,size:22}),
    {alignment:AlignmentType.RIGHT,spacing:{before:200},border:{top:{style:BorderStyle.SINGLE,size:6,color:"000000"}}}));

  const doc = new Document({sections:[{properties:{page:{size:{width:11906,height:16838},margin:{top:900,right:900,bottom:900,left:900}}},children}]});
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`${(test.title||"test").replace(/\s+/g,"-")}-V${variant}.docx`;
  a.click(); URL.revokeObjectURL(url);
}

// ─── SMALL COMPONENTS ─────────────────────────────────────────────────────────

const Spinner = ({label=""}) => (
  <span style={{display:"inline-flex",alignItems:"center",gap:7,color:"#888"}}>
    <span style={{display:"inline-block",width:12,height:12,border:"1.5px solid #ccc",borderTopColor:"#333",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
    {label && <span style={{fontSize:10,letterSpacing:"0.18em"}}>{label}</span>}
  </span>
);

// Chips with expand after row 3 (~full row = ~6 chips)
function ChipList({items, selected, onToggle, onRemove}) {
  const [exp, setExp] = useState(false);
  const LIMIT = 6;
  const visible = exp ? items : items.slice(0, LIMIT);
  const hasMore = items.length > LIMIT;
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
      {visible.map((item,i) => (
        <span key={item} style={{display:"inline-flex",alignItems:"center",gap:0}}>
          <button
            onClick={() => onToggle(item)}
            style={{...S.chip, ...(selected.includes(item)?S.chipOn:{}), borderRight:onRemove?"none":undefined, paddingRight:onRemove?8:undefined}}>
            {item}
          </button>
          {onRemove && (
            <button onClick={() => onRemove(i)}
              style={{height:"100%",border:"1px solid",borderColor:selected.includes(item)?"#0a0a0a":"#d0d0d0",borderLeft:"none",background:selected.includes(item)?"#0a0a0a":"none",color:selected.includes(item)?"#666":"#ccc",padding:"0 7px",fontSize:13,lineHeight:1,display:"flex",alignItems:"center",cursor:"pointer"}}>
              ×
            </button>
          )}
        </span>
      ))}
      {hasMore && (
        <button onClick={() => setExp(v=>!v)}
          style={{...S.chip,color:"#aaa",borderStyle:"dashed",borderColor:"#d8d8d8"}}>
          {exp ? "less ↑" : `+${items.length-LIMIT} more`}
        </button>
      )}
    </div>
  );
}

function AddInput({placeholder, onAdd}) {
  const [val, setVal] = useState("");
  const add = () => { if(val.trim()) { onAdd(val.trim()); setVal(""); }};
  return (
    <div style={{display:"flex",gap:6,marginTop:8}}>
      <input style={{...S.input,flex:1,padding:"8px 11px",fontSize:12}}
        placeholder={placeholder} value={val}
        onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&add()} />
      <button style={S.btnGhost} onClick={add}>+ ADD</button>
    </div>
  );
}

// ─── SECTION EDITOR ───────────────────────────────────────────────────────────

function SectionEditor({section, onClose, onSave}) {
  const [instructions, setInstructions] = useState(section.instructions||"");
  const [wb, setWb] = useState((section.wordBox||[]).join(", "));
  const [items, setItems] = useState(
    (section.content||[]).map(item =>
      typeof item==="string" ? {question:item,options:null,czech:null}
      : {question:item.question||"",options:item.options||null,czech:item.czech||null}
    )
  );
  const upd = (i,f,v) => setItems(p=>p.map((it,idx)=>idx===i?{...it,[f]:v}:it));
  const updO = (i,j,v) => setItems(p=>p.map((it,idx)=>{
    if(idx!==i) return it;
    const o=[...(it.options||["","","",""])]; o[j]=v; return {...it,options:o};
  }));
  const add = () => setItems(p=>[...p,{
    question:"",
    options:items[0]?.options?["","","",""]:null,
    czech:items[0]?.czech!==undefined?null:null,
  }]);
  const del = i => setItems(p=>p.filter((_,idx)=>idx!==i));
  const save = () => {
    const wordBox = wb.trim() ? wb.split(",").map(w=>w.trim()).filter(Boolean) : null;
    onSave({...section, instructions, wordBox, content:items});
  };
  return (
    <div style={{background:"#fff",border:"1px solid #d8d8d8",padding:"18px 20px",animation:"fadeIn 0.2s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{fontFamily:"'Archivo Black',sans-serif",fontSize:12,letterSpacing:"0.1em"}}>EDIT — {section.type}</span>
        <div style={{display:"flex",gap:5}}>
          <button style={S.btnGhost} onClick={onClose}>CANCEL</button>
          <button style={S.btnDark} onClick={save}>SAVE</button>
        </div>
      </div>
      <div style={{marginBottom:10}}><div style={S.micro}>INSTRUCTIONS</div><input style={S.input} value={instructions} onChange={e=>setInstructions(e.target.value)}/></div>
      <div style={{marginBottom:14}}><div style={S.micro}>WORD BOX (comma separated)</div><input style={S.input} placeholder="word1, word2..." value={wb} onChange={e=>setWb(e.target.value)}/></div>
      <div style={S.micro}>ITEMS</div>
      {items.map((item,i) => (
        <div key={i} style={{background:"#f9f9f9",border:"1px solid #ebebeb",padding:"10px 12px",marginBottom:5,display:"flex",gap:8}}>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#ccc",paddingTop:9,minWidth:18}}>{i+1}.</span>
          <div style={{flex:1}}>
            {item.czech !== null ? (
              <div style={{display:"flex",gap:7}}>
                <div style={{flex:1}}><div style={S.micro}>CZECH</div><input style={S.input} value={item.czech||""} onChange={e=>upd(i,"czech",e.target.value)}/></div>
                <div style={{flex:1}}><div style={S.micro}>ENGLISH</div><input style={S.input} value={item.question||""} onChange={e=>upd(i,"question",e.target.value)}/></div>
              </div>
            ) : (
              <><div style={S.micro}>SENTENCE</div><input style={S.input} value={item.question||""} onChange={e=>upd(i,"question",e.target.value)} placeholder="Use ___ for blanks"/></>
            )}
            {item.options && (
              <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
                {item.options.map((o,j) => (
                  <div key={j} style={{flex:"1 1 90px"}}><div style={S.micro}>{String.fromCharCode(65+j)}</div><input style={S.input} value={o} onChange={e=>updO(i,j,e.target.value)}/></div>
                ))}
              </div>
            )}
          </div>
          <button onClick={()=>del(i)} style={{background:"none",border:"none",color:"#ccc",fontSize:18,paddingTop:4,flexShrink:0}}>×</button>
        </div>
      ))}
      <button style={{...S.btnGhost,marginTop:6,fontSize:10}} onClick={add}>+ ADD ITEM</button>
    </div>
  );
}

// ─── SECTION CARD ─────────────────────────────────────────────────────────────

function SectionCard({section, index, variant, cls, topic, apiKey, onUpdate}) {
  const [loading, setLoading] = useState(false);
  const [cp, setCp] = useState("");
  const [showP, setShowP] = useState(false);
  const [editing, setEditing] = useState(false);

  const doRegen = async (extra="") => {
    setLoading(true); setShowP(false); setCp("");
    try { onUpdate(index, await claude(apiKey, promptRegen(cls, topic, section, variant, extra))); }
    catch(e) { alert("Failed: "+e.message); }
    setLoading(false);
  };

  const renderItems = () => (section.content||[]).map((item,i) => (
    <div key={i} style={{display:"flex",gap:11,marginBottom:12,fontSize:13,lineHeight:1.75}}>
      <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:"#ccc",flexShrink:0,paddingTop:2,minWidth:18}}>{i+1}.</span>
      <div style={{flex:1}}>
        {typeof item==="string" ? item : (<>
          <div>{item.czech
            ? <><span style={{color:"#aaa",fontSize:12}}>{item.czech}</span>&nbsp;&nbsp;→&nbsp;&nbsp;___________________________</>
            : item.question}
          </div>
          {item.options && (
            <div style={{display:"flex",gap:18,marginTop:4,flexWrap:"wrap"}}>
              {item.options.map((o,j) => <span key={j} style={{fontSize:11,color:"#555"}}><b style={{color:"#111",marginRight:2}}>{String.fromCharCode(65+j)}.</b>{o}</span>)}
            </div>
          )}
        </>)}
      </div>
    </div>
  ));

  if (editing) return (
    <div style={{marginBottom:24}}>
      <SectionEditor section={section} onClose={()=>setEditing(false)} onSave={s=>{onUpdate(index,s);setEditing(false);}}/>
    </div>
  );

  return (
    <div style={{borderBottom:"1px solid #e8e8e8",paddingBottom:22,marginBottom:22,animation:"fadeIn 0.3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:13,alignItems:"flex-start"}}>
          <span style={{fontFamily:"'Archivo Black',sans-serif",fontSize:30,lineHeight:1,color:"#ebebeb",flexShrink:0}}>{String.fromCharCode(64+index+1)}</span>
          <div>
            <div style={{fontWeight:700,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase"}}>{section.type}</div>
            {section.instructions && <div style={{fontSize:11,color:"#aaa",marginTop:2,fontStyle:"italic"}}>{section.instructions}</div>}
          </div>
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
          {loading ? <Spinner label="REGEN"/> : (<>
            <button style={S.btnGhost} onClick={()=>setShowP(v=>!v)}>PROMPT</button>
            <button style={S.btnGhost} onClick={()=>setEditing(true)}>EDIT</button>
            <button style={S.btnGhost} onClick={()=>doRegen()}>↻</button>
          </>)}
        </div>
      </div>
      {showP && !loading && (
        <div style={{display:"flex",gap:6,marginBottom:11,marginLeft:43,animation:"fadeIn 0.2s ease"}}>
          <input style={{...S.input,flex:1,fontSize:12,padding:"8px 11px",fontStyle:"italic"}}
            placeholder="e.g. include: drought, species..."
            value={cp} onChange={e=>setCp(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&doRegen(cp)} autoFocus/>
          <button style={S.btnDark} onClick={()=>doRegen(cp)}>APPLY</button>
        </div>
      )}
      <div style={{paddingLeft:43}}>
        {section.wordBox?.length > 0 && (
          <div style={{border:"1px solid #ebebeb",padding:"8px 12px",display:"flex",flexWrap:"wrap",gap:7,marginBottom:12,background:"#fafafa"}}>
            {section.wordBox.map((w,i) => <span key={i} style={{fontFamily:"'Space Mono',monospace",fontSize:11,background:"#f0f0f0",padding:"2px 9px"}}>{w}</span>)}
          </div>
        )}
        {renderItems()}
      </div>
      <div style={{textAlign:"right",fontFamily:"'Space Mono',monospace",fontSize:10,color:"#ccc",marginTop:2}}>Score ___/{section.score||5}</div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [view, setView] = useState("dashboard");
  const [apiKey, setApiKey] = useState(() => load("tg_apikey",""));
  const [showKey, setShowKey] = useState(false);
  const [saved, setSaved] = useState(() => load("tg_saved",[]));
  const [allTypes, setAllTypes] = useState(() => load("tg_types", DEFAULT_TYPES));
  const [allTopics, setAllTopics] = useState(() => load("tg_topics", DEFAULT_TOPICS));

  useEffect(() => localStorage.setItem("tg_apikey", JSON.stringify(apiKey)), [apiKey]);
  useEffect(() => localStorage.setItem("tg_saved", JSON.stringify(saved)), [saved]);
  useEffect(() => localStorage.setItem("tg_types", JSON.stringify(allTypes)), [allTypes]);
  useEffect(() => localStorage.setItem("tg_topics", JSON.stringify(allTopics)), [allTopics]);

  const [form, setForm] = useState({classId:"",topics:[],customTopic:"",n:3,types:[],words:"",ab:true});
  const [gen, setGen] = useState(false);
  const [genMsg, setGenMsg] = useState("");
  const [test, setTest] = useState(null);
  const [variant, setVariant] = useState("A");
  const [wordExp, setWordExp] = useState(false);
  const [search, setSearch] = useState("");
  const [filterCls, setFilterCls] = useState("");

  const cls = CLASSES.find(c => c.id===form.classId);
  const currentTopics = allTopics[form.classId] || [];
  const activeTopic = form.customTopic || (form.topics.length>0 ? form.topics.join(" + ") : "");
  const activeTypes = form.types.length>0 ? form.types : allTypes;

  const generate = async () => {
    if (!apiKey) { alert("Please enter your Anthropic API key first."); setShowKey(true); return; }
    if (!form.classId || !activeTopic) return;
    setGen(true);
    try {
      const topicsArr = form.topics.length>0 ? form.topics : [activeTopic];
      setGenMsg("VARIANT A...");
      const A = await claude(apiKey, promptTest(cls, topicsArr, form.n, activeTypes, form.words, "A"));
      let B = null;
      if (form.ab) {
        setGenMsg("VARIANT B...");
        B = await claude(apiKey, promptTest(cls, topicsArr, form.n, activeTypes, form.words, "B"));
      }
      setTest({id:Date.now(), createdAt:new Date().toLocaleDateString("cs-CZ"), classId:form.classId, variants:{A,B}});
      setVariant("A"); setView("preview");
    } catch(e) { alert("Failed: "+e.message); console.error(e); }
    setGen(false); setGenMsg("");
  };

  const updSec = (v,idx,sec) => setTest(prev=>({
    ...prev, variants:{...prev.variants, [v]:{...prev.variants[v],
      sections:prev.variants[v].sections.map((s,i)=>i===idx?sec:s)}}
  }));

  const saveTest = () => setSaved(prev => {
    const ex = prev.find(t=>t.id===test.id);
    return ex ? prev.map(t=>t.id===test.id?test:t) : [test,...prev];
  });

  const activeData = test?.variants?.[variant];
  const filtered = saved.filter(t => {
    const c = CLASSES.find(x=>x.id===t.classId);
    const title = t.variants?.A?.title||"";
    return (filterCls ? t.classId===filterCls : true)
      && (search ? title.toLowerCase().includes(search.toLowerCase()) || c?.label.toLowerCase().includes(search.toLowerCase()) : true);
  });

  const toggleTopic = t => setForm(f=>({...f, topics:f.topics.includes(t)?f.topics.filter(x=>x!==t):[...f.topics,t], customTopic:""}));
  const toggleType = t => setForm(f=>({...f, types:f.types.includes(t)?f.types.filter(x=>x!==t):[...f.types,t]}));

  const removeTopic = i => {
    const t = currentTopics[i];
    setAllTopics(p=>({...p,[form.classId]:p[form.classId].filter((_,idx)=>idx!==i)}));
    setForm(f=>({...f,topics:f.topics.filter(x=>x!==t)}));
  };
  const removeType = i => {
    const t = allTypes[i];
    setAllTypes(p=>p.filter((_,idx)=>idx!==i));
    setForm(f=>({...f,types:f.types.filter(x=>x!==t)}));
  };

  return (
    <div style={{fontFamily:"'Archivo',sans-serif",background:"#f6f6f4",minHeight:"100vh",color:"#0a0a0a"}}>

      {/* API KEY BANNER */}
      {(!apiKey || showKey) && (
        <div style={{background:"#0a0a0a",padding:"10px 24px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:10,letterSpacing:"0.14em",color:"#888",flexShrink:0}}>ANTHROPIC API KEY</span>
          <input
            type="password"
            style={{flex:1,minWidth:260,background:"#1a1a1a",border:"1px solid #333",color:"#fff",padding:"7px 12px",fontSize:12,fontFamily:"'Archivo',sans-serif",outline:"none"}}
            placeholder="sk-ant-..."
            value={apiKey}
            onChange={e=>setApiKey(e.target.value)}
          />
          {apiKey && <button style={{...S.btnGhost,borderColor:"#444",color:"#aaa",fontSize:10}} onClick={()=>setShowKey(false)}>DONE</button>}
          <span style={{fontSize:10,color:"#555",letterSpacing:"0.08em"}}>Stored locally in your browser.</span>
        </div>
      )}

      {/* NAV */}
      <nav style={{background:"#0a0a0a",position:"sticky",top:0,zIndex:99,borderBottom:"1px solid #1a1a1a"}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"0 24px",height:50,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:9,cursor:"pointer"}} onClick={()=>setView("dashboard")}>
            <span style={{fontFamily:"'Archivo Black',sans-serif",fontSize:14,color:"#fff",letterSpacing:"0.15em"}}>TESTGEN</span>
            <span style={{fontSize:9,color:"#555",letterSpacing:"0.16em"}}>ENGLISH · GYMNASIUM</span>
          </div>
          <div style={{display:"flex",alignItems:"center"}}>
            {[["dashboard","OVERVIEW"],["create","NEW TEST"],["saved",`SAVED (${saved.length})`]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{background:"none",border:"none",color:(view===v||(view==="preview"&&v==="create"))?"#fff":"#555",fontSize:10,letterSpacing:"0.16em",padding:"6px 13px",fontFamily:"'Archivo',sans-serif",fontWeight:500}}>
                {l}
              </button>
            ))}
            <button onClick={()=>setShowKey(v=>!v)} style={{background:"none",border:"none",color:apiKey?"#555":"#e55",fontSize:10,letterSpacing:"0.16em",padding:"6px 10px",fontFamily:"'Archivo',sans-serif",fontWeight:500}} title="API Key">
              {apiKey?"KEY ✓":"KEY ⚠"}
            </button>
          </div>
        </div>
      </nav>

      {/* DASHBOARD */}
      {view==="dashboard" && (
        <main style={{maxWidth:900,margin:"0 auto",padding:"44px 24px 96px"}}>
          <p style={{fontSize:10,letterSpacing:"0.24em",color:"#aaa",marginBottom:13}}>SELECT CLASS</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,background:"#ddd",border:"1px solid #ddd",marginBottom:44}}>
            {CLASSES.map(c => (
              <div key={c.id}
                onClick={()=>{setForm(f=>({...f,classId:c.id,topics:[]}));setView("create");}}
                style={{background:"#f6f6f4",padding:"20px 18px",cursor:"pointer",transition:"background 0.12s",position:"relative"}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"#bbb",marginBottom:4,transition:"color 0.12s"}}>{c.level}</div>
                <div style={{fontFamily:"'Archivo Black',sans-serif",fontSize:18,letterSpacing:"0.04em",marginBottom:4,transition:"color 0.12s"}}>{c.label}</div>
                <div style={{fontSize:9,color:"#bbb",transition:"color 0.12s"}}>{c.book}</div>
                <style>{`div[data-id="${c.id}"]:hover > * { color: #fff !important; }`}</style>
              </div>
            ))}
          </div>

          {saved.length > 0 && (<>
            <p style={{fontSize:10,letterSpacing:"0.24em",color:"#aaa",marginBottom:11}}>RECENT</p>
            <div style={{border:"1px solid #e0e0e0"}}>
              {saved.slice(0,5).map(t => {
                const c = CLASSES.find(x=>x.id===t.classId);
                return (
                  <div key={t.id}
                    style={{display:"flex",justifyContent:"space-between",padding:"12px 15px",borderBottom:"1px solid #eee",cursor:"pointer",alignItems:"center"}}
                    onClick={()=>{setTest(t);setVariant("A");setView("preview");}}>
                    <span style={{fontWeight:600,fontSize:13}}>{t.variants?.A?.title}</span>
                    <span style={{fontSize:10,color:"#bbb"}}>{c?.label} · {t.createdAt}</span>
                  </div>
                );
              })}
            </div>
          </>)}
        </main>
      )}

      {/* CREATE */}
      {view==="create" && (
        <main style={{maxWidth:900,margin:"0 auto",padding:"44px 24px 96px"}}>
          <div style={{fontFamily:"'Archivo Black',sans-serif",fontSize:24,letterSpacing:"0.06em",marginBottom:32}}>NEW TEST</div>
          <div style={{display:"flex",flexDirection:"column",gap:26}}>

            {/* Class 4×2 */}
            <div>
              <div style={S.label}>CLASS</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>
                {CLASSES.map(c => (
                  <button key={c.id} onClick={()=>setForm(f=>({...f,classId:c.id,topics:[]}))}
                    style={{...S.chip,width:"100%",...(form.classId===c.id?S.chipOn:{})}}>
                    {c.label}
                    <span style={{fontSize:9,opacity:form.classId===c.id?0.6:0.45,marginTop:1,display:"block"}}>{c.level}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Topics */}
            {form.classId && (
              <div>
                <div style={S.label}>TOPICS <span style={{color:"#ccc",fontWeight:400,fontSize:9,letterSpacing:0}}> select one or more</span></div>
                <ChipList
                  items={currentTopics}
                  selected={form.topics}
                  onToggle={toggleTopic}
                  onRemove={removeTopic}
                />
                <AddInput
                  placeholder={`Add topic for ${cls?.label}...`}
                  onAdd={t => {
                    setAllTopics(p=>({...p,[form.classId]:[...(p[form.classId]||[]),t]}));
                    setForm(f=>({...f,topics:[...f.topics,t],customTopic:""}));
                  }}
                />
                <input style={{...S.input,marginTop:8,fontSize:12}}
                  placeholder="Or type a one-off custom topic (overrides selection)..."
                  value={form.customTopic}
                  onChange={e=>setForm(f=>({...f,customTopic:e.target.value,topics:[]}))} />
              </div>
            )}

            {/* Sections */}
            <div>
              <div style={S.label}>SECTIONS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {[2,3,4,5,6,7,8,9,10].map(n => (
                  <button key={n} onClick={()=>setForm(f=>({...f,n}))}
                    style={{...S.chip,padding:"9px 15px",...(form.n===n?S.chipOn:{})}}>{n}</button>
                ))}
              </div>
            </div>

            {/* Exercise types */}
            <div>
              <div style={S.label}>EXERCISE TYPES <span style={{color:"#ccc",fontWeight:400,fontSize:9,letterSpacing:0}}> optional — leave empty for auto</span></div>
              <ChipList
                items={allTypes}
                selected={form.types}
                onToggle={toggleType}
                onRemove={removeType}
              />
              <AddInput
                placeholder="Add new exercise type..."
                onAdd={t => {
                  setAllTypes(p=>[...p,t]);
                  setForm(f=>({...f,types:[...f.types,t]}));
                }}
              />
            </div>

            {/* Vocabulary */}
            <div>
              <div style={S.label}>SPECIFIC VOCABULARY</div>
              <textarea style={{...S.input,resize:"vertical"}} rows={2}
                placeholder="e.g. drought, species, recycle, pollution..."
                value={form.words} onChange={e=>setForm(f=>({...f,words:e.target.value}))} />
            </div>

            {/* A/B */}
            <div>
              <div style={S.label}>A/B VARIANTS</div>
              <div style={{display:"flex",alignItems:"center",gap:11}}>
                <div style={{width:40,height:22,borderRadius:11,background:form.ab?"#0a0a0a":"#ddd",cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}
                  onClick={()=>setForm(f=>({...f,ab:!f.ab}))}>
                  <div style={{position:"absolute",top:3,left:form.ab?19:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
                </div>
                <span style={{fontSize:12,color:"#888"}}>{form.ab?"A + B — anti-cheating":"Single variant"}</span>
              </div>
            </div>

            <button style={{...S.btnPrimary,opacity:(!form.classId||!activeTopic||gen)?0.25:1}}
              onClick={generate} disabled={gen||!form.classId||!activeTopic}>
              {gen ? <><Spinner/>&nbsp;{genMsg}</> : "GENERATE TEST →"}
            </button>
          </div>
        </main>
      )}

      {/* PREVIEW */}
      {view==="preview" && activeData && (
        <main style={{maxWidth:800,margin:"0 auto",padding:"36px 24px 96px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22,gap:10,flexWrap:"wrap"}}>
            <div>
              <div style={{fontFamily:"'Archivo Black',sans-serif",fontSize:19,letterSpacing:"0.04em"}}>{activeData.title}</div>
              <div style={{fontSize:10,letterSpacing:"0.14em",color:"#bbb",marginTop:3}}>{activeData.class} · {activeData.level} · {activeData.topics||activeData.topic}</div>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
              {test?.variants?.B && (
                <div style={{display:"flex",border:"1px solid #d0d0d0"}}>
                  {["A","B"].map(v => (
                    <button key={v} onClick={()=>setVariant(v)}
                      style={{background:variant===v?"#0a0a0a":"none",color:variant===v?"#fff":"#aaa",border:"none",padding:"7px 14px",fontSize:10,letterSpacing:"0.14em",fontFamily:"'Archivo',sans-serif",fontWeight:600,cursor:"pointer"}}>
                      VARIANT {v}
                    </button>
                  ))}
                </div>
              )}
              <button style={S.btnGhost} onClick={saveTest}>SAVE</button>
              <button style={S.btnGhost} onClick={()=>openPDF(activeData,variant)}>PDF ↗</button>
              <button style={{...S.btnGhost,minWidth:72}} disabled={wordExp}
                onClick={async()=>{setWordExp(true);try{await exportWord(activeData,variant);}catch(e){alert(e.message);}setWordExp(false);}}>
                {wordExp?<Spinner/>:"WORD ↓"}
              </button>
              <button style={S.btnDark} onClick={()=>setView("create")}>← BACK</button>
            </div>
          </div>

          <div style={{borderTop:"3px solid #0a0a0a",borderBottom:"1px solid #d0d0d0",padding:"15px 0",marginBottom:26,display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"#ccc",letterSpacing:"0.16em",marginBottom:3}}>VARIANT {variant}</div>
              <div style={{fontFamily:"'Archivo Black',sans-serif",fontSize:17,letterSpacing:"0.03em"}}>{activeData.title}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <span style={{fontSize:11,fontWeight:500}}>NAME: _________________________________</span>
              <span style={{fontSize:11,fontWeight:500}}>CLASS: _____________ DATE: ______________</span>
            </div>
          </div>

          {activeData.sections?.map((sec,i) => (
            <SectionCard key={`${variant}-${i}`} section={sec} index={i} variant={variant}
              cls={CLASSES.find(c=>c.id===test.classId)} topic={activeData.topics||activeData.topic}
              apiKey={apiKey}
              onUpdate={(idx,s)=>updSec(variant,idx,s)}/>
          ))}

          <div style={{borderTop:"2px solid #0a0a0a",paddingTop:10,textAlign:"right",fontFamily:"'Archivo Black',sans-serif",fontSize:12,letterSpacing:"0.1em"}}>
            TOTAL: _____ / {activeData.sections?.reduce((s,x)=>s+(x.score||0),0)}
          </div>
        </main>
      )}

      {/* SAVED */}
      {view==="saved" && (
        <main style={{maxWidth:900,margin:"0 auto",padding:"44px 24px 96px"}}>
          <div style={{fontFamily:"'Archivo Black',sans-serif",fontSize:24,letterSpacing:"0.06em",marginBottom:20}}>SAVED TESTS</div>
          <div style={{display:"flex",gap:7,marginBottom:16}}>
            <input style={{...S.input,flex:1}} placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
            <select style={{border:"1px solid #d0d0d0",padding:"10px 11px",fontSize:10,fontFamily:"'Archivo',sans-serif",background:"#f6f6f4",outline:"none",letterSpacing:"0.1em"}}
              value={filterCls} onChange={e=>setFilterCls(e.target.value)}>
              <option value="">ALL CLASSES</option>
              {CLASSES.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>
          {filtered.length===0 ? (
            <div style={{textAlign:"center",padding:"64px 0",fontSize:11,color:"#ccc",letterSpacing:"0.15em"}}>NO TESTS SAVED YET</div>
          ) : (
            <div style={{border:"1px solid #e0e0e0"}}>
              {filtered.map(t => {
                const c = CLASSES.find(x=>x.id===t.classId);
                return (
                  <div key={t.id} style={{display:"flex",alignItems:"center",padding:"12px 15px",borderBottom:"1px solid #eee",gap:6}}>
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>{setTest(t);setVariant("A");setView("preview");}}>
                      <div style={{fontWeight:600,fontSize:13}}>{t.variants?.A?.title}</div>
                      <div style={{fontSize:10,color:"#bbb",marginTop:2}}>
                        {c?.label} · {c?.level} · {t.variants?.A?.topics||t.variants?.A?.topic} · {t.createdAt}
                        {t.variants?.B && <span style={{background:"#0a0a0a",color:"#fff",fontSize:8,padding:"2px 5px",marginLeft:6}}>A/B</span>}
                      </div>
                    </div>
                    <button style={S.btnGhost} onClick={()=>openPDF(t.variants.A,"A")}>PDF A</button>
                    {t.variants?.B && <button style={S.btnGhost} onClick={()=>openPDF(t.variants.B,"B")}>PDF B</button>}
                    <button style={S.btnGhost} onClick={()=>setSaved(p=>p.filter(x=>x.id!==t.id))}>✕</button>
                  </div>
                );
              })}
            </div>
          )}
        </main>
      )}
    </div>
  );
}

// ─── STYLES ───────────────────────────────────────────────────────────────────

const S = {
  label:{fontSize:10,letterSpacing:"0.22em",color:"#aaa",marginBottom:9,fontWeight:500},
  micro:{fontSize:9,letterSpacing:"0.18em",color:"#bbb",marginBottom:3,fontWeight:500},
  chip:{background:"none",border:"1px solid #d0d0d0",padding:"9px 13px",fontSize:12,letterSpacing:"0.07em",fontFamily:"'Archivo',sans-serif",fontWeight:500,color:"#333",display:"flex",flexDirection:"column",alignItems:"flex-start"},
  chipOn:{background:"#0a0a0a",borderColor:"#0a0a0a",color:"#fff"},
  input:{width:"100%",border:"1px solid #d0d0d0",padding:"10px 13px",fontSize:13,fontFamily:"'Archivo',sans-serif",background:"#fff",outline:"none"},
  btnPrimary:{background:"#0a0a0a",color:"#fff",border:"none",padding:"13px 26px",fontSize:11,letterSpacing:"0.2em",fontFamily:"'Archivo',sans-serif",fontWeight:700,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:7},
  btnDark:{background:"#0a0a0a",color:"#fff",border:"none",padding:"8px 14px",fontSize:10,letterSpacing:"0.13em",fontFamily:"'Archivo',sans-serif",fontWeight:600,cursor:"pointer"},
  btnGhost:{background:"none",border:"1px solid #d0d0d0",color:"#666",padding:"7px 11px",fontSize:10,letterSpacing:"0.13em",fontFamily:"'Archivo',sans-serif",fontWeight:500,cursor:"pointer"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
